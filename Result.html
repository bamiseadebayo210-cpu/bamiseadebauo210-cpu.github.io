    <h1>UniAssess Result</h1>

  <p id="score"></p>
  <p id="timeUsed"></p>

  <script>
    // Get answers from URL
const params = new URLSearchParams(window.location.search);
let score = 0;

// Check Question 1
if (params.get("q1") === "4") {
    score++;
}

// Display score
const scoreElement = document.getElementById("score");
if (scoreElement) {
    scoreElement.textContent = "Your Score: " + score;
}

// Get time used from localStorage
let timeUsed = localStorage.getItem("timeUsed");

if (timeUsed) {
    // Ensure timeUsed is a number for calculations
    let timeSeconds = parseInt(timeUsed);
    let minutes = Math.floor(timeSeconds / 60);
    let seconds = timeSeconds % 60;

    const timeElement = document.getElementById("timeUsed");
    if (timeElement) {
        // FIXED: Added missing + before " seconds"
        timeElement.textContent = "Time Used: " + minutes + " minutes " + seconds + " seconds";
    }
} else {
    const timeElement = document.getElementById("timeUsed");
    if (timeElement) {
        timeElement.textContent = "Time Used: Not recorded";
    }
}

  </script>
