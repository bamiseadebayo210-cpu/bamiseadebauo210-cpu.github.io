<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNI-ASSESS</title>
</head>
<body>
    <h1>No internet connection ❌</h1>
    <p>Check your network and try again./p>

       <p id="status"></p>
       <script>
        async function retry() {
            const status = 
            document.getElementById("status");
            try{
                   await fetch("index.html", {cache:"no-store"});
                window.location.href = "index.html";}catch{
                    status.innerText = "Stil offline 😔 Try again later";
                }
            }
       </script>
</body>
</html>
